name: CodeQL (SAST)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC — catches advisories on unchanged code

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Security-focused query pack. Findings surface in the Security tab;
          # high/critical fail the check (branch protection), medium/low warn +
          # require a documented dismissal (see SECURITY_GATE.md).
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
