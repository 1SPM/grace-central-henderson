name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:run

  security-smoke:
    name: Security Smoke Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run src/security/smoke.test.ts

  rls-lint:
    name: RLS Lint (migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run tools/lint-rls.test.ts
      - run: npx tsx tools/lint-rls.ts

  frontend-safety:
    name: Frontend Safety (service-role + public-secret)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Unit-tests the detector, then runs it against the tree (exit 1 = block).
      - run: npx vitest run tools/check-frontend-safety.test.ts
      - run: npx tsx tools/check-frontend-safety.ts

  rls-policy-tests:
    name: RLS Policy Tests (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Cross-tenant / escalation / read-restriction / entitlement / care-visibility
      # smoke tests. They SKIP (pass) until the SUPABASE_TEST_* secrets are set,
      # then run for real and BLOCK on failure. See SECURITY_GATE.md.
      - run: >
          npx vitest run
          tools/cross-tenant-smoke.test.ts
          tools/rls-escalation-smoke.test.ts
          tools/rls-read-restriction-smoke.test.ts
          tools/entitlement-billing-rls-smoke.test.ts
          tools/care-prayer-visibility-smoke.test.ts
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_TEST_TENANT_A_ID: ${{ secrets.SUPABASE_TEST_TENANT_A_ID }}
          SUPABASE_TEST_TENANT_A_TOKEN: ${{ secrets.SUPABASE_TEST_TENANT_A_TOKEN }}
          SUPABASE_TEST_TENANT_A_MEMBER_TOKEN: ${{ secrets.SUPABASE_TEST_TENANT_A_MEMBER_TOKEN }}
          SUPABASE_TEST_TENANT_B_ID: ${{ secrets.SUPABASE_TEST_TENANT_B_ID }}
          SUPABASE_TEST_TENANT_B_TOKEN: ${{ secrets.SUPABASE_TEST_TENANT_B_TOKEN }}

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks needs full git history to scan all commits on a push.
          # On PRs the action scans only the diff regardless.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Production deps are currently clean. Dev-dep findings are tracked
      # in TECH_DEBT.md TD-032 and surfaced by Dependabot for controlled
      # major-version upgrades.
      - run: npm audit --omit=dev --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, security-smoke, rls-lint, frontend-safety, rls-policy-tests, gitleaks, audit]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
