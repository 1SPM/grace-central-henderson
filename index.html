<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GRACE | Central Henderson</title>
    <style>
      :root {
        --accent: #EE2B37;
        --dark: #000000;
        --cream: #f5f0e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Poppins", "Segoe UI", sans-serif;
        color: #000000;
        background: #ffffff;
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 20px 60px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.6;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 14px;
      }

      a.card {
        display: block;
        text-decoration: none;
        background: #fff;
        border: 1px solid #e5e5e5;
        border-left: 5px solid #EE2B37;
        border-radius: 12px;
        padding: 14px;
        color: inherit;
      }

      a.card:hover {
        border-color: #EE2B37;
        transform: translateY(-1px);
      }

      .group-title {
        margin: 28px 0 10px;
        color: #000000;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Central Henderson · GRACE</h1>
      <p>Member portal prototypes for Central Henderson. Share this hub link to show progress.</p>

      <h2 class="group-title">Member Experience</h2>
      <div class="card-grid">
        <a class="card" href="previews/grace_member_portal_central.html">
          <strong>Desktop Member Portal</strong><br />
          Primary demo — full Central Henderson branding
        </a>
        <a class="card" href="previews/grace_mobile_ios-central.html">
          <strong>Mobile Member App</strong><br />
          iOS-style mobile prototype
        </a>
      </div>
    </main>
  </body>
</html>
